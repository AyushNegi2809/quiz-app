<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/quiz.css') }}">
</head>
<body>
    <h1>Quiz Started</h1>
    <h2 id="timerDisplay">Time Left: 00:00</h2>
    <h3 id="progress">Answered: 0 / 0</h3>
    <section id="smartPanel">
        <p id="panelProgress">Progress: 0 / 0</p>
        <p id="panelRemaining">Remaining: 0</p>
        <p id="panelTimeLeft">Time Left: 00:00</p>
        <p id="panelAvgTime">Average Time per Question: 0 sec</p>
        <div id="timeWarning"></div>
    </section>

    <form id="quizForm">
        <div id="quizContainer"></div>
        <button type="submit">Submit Quiz</button>
    </form>

    <script src="{{ url_for('static', filename='js/sessionManager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
</body>
</html>
