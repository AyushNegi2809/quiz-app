<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ CONFIGURATION</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/config.css') }}">
</head>

<body>

    <div class="container">
        <h1>Quiz Configurations</h1>

        <div id="quizContainer">
            <form id="quizForm">

                <div>
                    <label>Select Topic: </label>
                    <select id="topic">
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="Javascript">Javascript</option>
                    </select>
                </div>

                <div>
                    <label>Select Difficulty: </label>
                    <select id="difficulty">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advance">Advance</option>
                    </select>
                </div>

                <div>
                    <label>Select Number of Questions: </label>
                    <select id="questions">
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>

                <div id="quizLoader">Generating quiz...</div>

                <br>
                <button type="submit">Generate Quiz</button>

            </form>
        </div>

        <div id="errorPanel" role="alert" aria-live="polite">
            <p id="errorMessage">&#9888; Unable to generate quiz right now. Please try again.</p>
            <button type="button" id="retryBtn">Retry</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/sessionManager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>

</body>

</html>
